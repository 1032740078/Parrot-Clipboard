name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CI: true

jobs:
  release-check:
    runs-on: macos-latest
    steps:
      - name: Ensure workflow runs on a tag ref
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
            echo "release workflow 只能在 tag ref 上执行" >&2
            exit 1
          fi
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium
      - name: Run release check
        run: pnpm run release:check

  bundle:
    needs: release-check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos
            os: macos-latest
            bundles: app
          - name: windows
            os: windows-latest
            bundles: nsis,msi
          - name: linux
            os: ubuntu-22.04
            bundles: appimage,deb,rpm
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux bundle dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - name: Prepare macOS signing assets
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ] || [ -z "$APPLE_CERTIFICATE_PASSWORD" ] || [ -z "$APPLE_API_ISSUER" ] || [ -z "$APPLE_API_KEY_ID" ] || [ -z "$APPLE_API_KEY_CONTENT" ] || [ -z "$APPLE_SIGNING_IDENTITY" ]; then
            echo "缺少 macOS 签名或公证 secrets" >&2
            exit 1
          fi
          CERT_PATH="$RUNNER_TEMP/app-signing-cert.p12"
          KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          echo -n "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          printf '%s' "$APPLE_API_KEY_CONTENT" > "$KEY_PATH"
          security create-keychain -p "$APPLE_CERTIFICATE_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$APPLE_CERTIFICATE_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$APPLE_CERTIFICATE_PASSWORD" "$KEYCHAIN_PATH"
          echo "APPLE_API_KEY=$APPLE_API_KEY_ID" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"
          echo "APPLE_API_ISSUER=$APPLE_API_ISSUER" >> "$GITHUB_ENV"
          echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY" >> "$GITHUB_ENV"
      - name: Prepare Windows signing assets
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
          WINDOWS_SIGN_DIGEST_ALGORITHM: ${{ secrets.WINDOWS_SIGN_DIGEST_ALGORITHM }}
          WINDOWS_TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}
          WINDOWS_TIMESTAMP_TSP: ${{ secrets.WINDOWS_TIMESTAMP_TSP }}
        run: |
          if (-not $env:WINDOWS_CERTIFICATE -or -not $env:WINDOWS_CERTIFICATE_PASSWORD) {
            throw '缺少 Windows 代码签名证书 secrets'
          }
          $certPath = Join-Path $env:RUNNER_TEMP 'windows-signing.pfx'
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $password = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $imported = Import-PfxCertificate -FilePath $certPath -Password $password -CertStoreLocation Cert:\CurrentUser\My
          $thumbprint = if ($env:WINDOWS_CERTIFICATE_THUMBPRINT) { $env:WINDOWS_CERTIFICATE_THUMBPRINT } else { $imported.Thumbprint }
          "WINDOWS_CERTIFICATE_THUMBPRINT=$thumbprint" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          if ($env:WINDOWS_SIGN_DIGEST_ALGORITHM) {
            "WINDOWS_SIGN_DIGEST_ALGORITHM=$env:WINDOWS_SIGN_DIGEST_ALGORITHM" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }
          if ($env:WINDOWS_TIMESTAMP_URL) {
            "WINDOWS_TIMESTAMP_URL=$env:WINDOWS_TIMESTAMP_URL" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }
          if ($env:WINDOWS_TIMESTAMP_TSP) {
            "WINDOWS_TIMESTAMP_TSP=$env:WINDOWS_TIMESTAMP_TSP" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Build release bundles
        run: pnpm tauri build --bundles ${{ matrix.bundles }}
      - name: Package macOS DMG in headless-safe mode
        if: runner.os == 'macOS'
        run: |
          bash scripts/package-macos-dmg.sh
          if [ -n "${APPLE_SIGNING_IDENTITY:-}" ]; then
            codesign --force --sign "$APPLE_SIGNING_IDENTITY" "src-tauri/target/release/bundle/dmg/鹦鹉剪贴板_$(node -p \"require('./package.json').version\")_aarch64.dmg"
          fi
      - name: Upload bundled artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          path: src-tauri/target/release/bundle/**
          if-no-files-found: error

  publish:
    needs: bundle
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-artifacts
          merge-multiple: true
      - name: Collect release assets
        run: |
          mkdir -p release-assets
          python3 - <<'PY'
          from pathlib import Path
          import shutil

          root = Path('release-artifacts')
          output = Path('release-assets')
          patterns = ['*.dmg', '*.msi', '*.exe', '*.AppImage', '*.deb', '*.rpm']
          copied = []
          for pattern in patterns:
              for file_path in root.rglob(pattern):
                  if file_path.is_file():
                      target = output / file_path.name
                      shutil.copy2(file_path, target)
                      copied.append(target.name)
          if not copied:
              raise SystemExit('未找到可发布的安装包产物')
          print('Collected assets:')
          for name in sorted(set(copied)):
              print(f'- {name}')
          PY
      - name: Generate SHA256 manifest
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS.txt
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" release-assets/* --clobber
            gh release edit "$tag" --draft=false --latest
          else
            gh release create "$tag" release-assets/* --title "$tag" --generate-notes --latest
          fi
