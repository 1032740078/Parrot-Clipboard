name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

env:
  CI: true

jobs:
  lint-frontend:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Frontend lint
        run: pnpm run lint
      - name: Frontend type-check
        run: pnpm run type-check

  lint-backend:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Rust fmt check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
      - name: Rust clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features -- -D warnings

  test-frontend:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Frontend tests
        run: pnpm run test:coverage

  test-e2e:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium
      - name: E2E tests
        run: pnpm run test:e2e

  test-backend:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Backend tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  build:
    if: github.ref == 'refs/heads/main'
    runs-on: ${{ matrix.os }}
    needs:
      - lint-frontend
      - lint-backend
      - test-frontend
      - test-e2e
      - test-backend
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos
            os: macos-latest
            bundles: app
          - name: windows
            os: windows-latest
            bundles: nsis,msi
          - name: linux
            os: ubuntu-22.04
            bundles: appimage,deb,rpm
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux bundle dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Build unsigned bundles
        run: pnpm tauri build --no-sign --bundles ${{ matrix.bundles }}
      - name: Package macOS DMG in headless-safe mode
        if: runner.os == 'macOS'
        run: bash scripts/package-macos-dmg.sh
